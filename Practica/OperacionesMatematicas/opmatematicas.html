<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>

        alert("Revisa la consola para ver los resultados de las operaciones matematicas");
        // Definir Variables
        let num1 = 20;
        let num2 = 10;
        let num3 = 5;
        let num4 = 2;
        let num5 = 4;


        // Suma
        let suma = num1 + num2;
        console.log("Suma: " + suma);

        // Resta
        let resta = num3 - num5;
        console.log("Resta: " + resta);

        // Multiplicación
        let multiplicacion = num5 * num4;
        console.log("Multiplicación: " + multiplicacion);

        // División
        let division = num1 / num4;
        console.log("División: " + division);

    </script>

</body>

</html>
